<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>アートボード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <div id="board" class="board" aria-label="4×6 アートボード"></div>
  </main>

  <div id="nickname-gate" class="nickname-gate hidden">
    <form id="nickname-form" class="nickname-form">
      <input type="text" name="nickname" placeholder="名前" maxlength="20" required autocomplete="off">
      <button type="submit" aria-label="はじめる">→</button>
    </form>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
    <div id="modal" class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <button type="button" id="modal-back" class="modal-back" aria-label="閉じる">‹</button>
        <div id="modal-title" class="modal-title"></div>
        <button type="button" id="modal-menu" class="modal-menu hidden" aria-label="メニュー">☰</button>
        <div id="modal-menu-dropdown" class="menu-dropdown hidden">
          <button type="button" id="menu-delete-chat" class="menu-item">delete chat</button>
        </div>
      </div>
      <div id="modal-content" class="modal-content"></div>
      <div id="modal-composer" class="modal-composer"></div>
    </div>
  </div>

  <div id="comment-menu" class="comment-menu hidden">
    <button type="button" id="comment-menu-delete" class="menu-item">delete</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
